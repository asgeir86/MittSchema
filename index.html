<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MittSchema</title>
  <meta name="description" content="Ditt schema med fotboja – se direkt om du får vara ute eller måste vara inne.">

  <!-- PWA / iOS hemskärm -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#10151a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MittSchema">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <main id="views">

      <!-- IDAG -->
      <section id="view-today" class="view">
        <header>
          <p class="app-name">MittSchema</p>
          <h1 class="today-date" id="today-date">—</h1>
        </header>

        <section class="status-card" id="status-card">
          <div class="status-emoji" id="status-emoji">⏳</div>
          <h2 class="status-title" id="status-title">Laddar …</h2>
          <p class="status-sub" id="status-sub"></p>
        </section>

        <section class="section">
          <h3 class="section-title">Dagens tidslinje</h3>
          <div class="timeline">
            <div class="timeline-bar" id="timeline-bar"></div>
            <div class="timeline-ticks">
              <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
            </div>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">Ute-tider idag</h3>
          <ul class="window-list" id="window-list"></ul>
        </section>

        <section class="section">
          <div class="perm-summary" id="perm-summary"></div>
        </section>
      </section>

      <!-- SCHEMA (byggs av js/views/schedule.js) -->
      <section id="view-schedule" class="view hidden"></section>

      <!-- VECKA (byggs av js/views/week.js) -->
      <section id="view-week" class="view hidden"></section>

    </main>

    <nav class="nav">
      <button class="nav-item active" data-view="today"><span class="ico">📅</span>Idag</button>
      <button class="nav-item" data-view="schedule"><span class="ico">📝</span>Schema</button>
      <button class="nav-item" data-view="week"><span class="ico">🗓️</span>Vecka</button>
    </nav>
  </div>

  <!-- Förslag på etiketter vid redigering -->
  <datalist id="label-suggestions">
    <option value="Arbete"></option>
    <option value="Inköp"></option>
    <option value="Ärenden"></option>
    <option value="Fritid"></option>
    <option value="Träning"></option>
    <option value="Behandling"></option>
    <option value="Läkarbesök"></option>
    <option value="Permission"></option>
  </datalist>

  <script src="js/schedule.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/views/today.js"></script>
  <script src="js/views/schedule.js"></script>
  <script src="js/views/week.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('SW-registrering misslyckades:', e);
        });
      });
    }
  </script>
</body>
</html>
